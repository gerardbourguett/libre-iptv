name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-windows:
    name: Construir release Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Instalar VLC (requerido por python-vlc)
        shell: powershell
        run: choco install vlc --yes --no-progress

      - name: Instalar dependencias
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system "pyinstaller>=6.0"

      - name: Ejecutar suite de pruebas
        run: pytest --tb=short
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Construir ejecutable
        run: pyinstaller iptv-player.spec

      - name: Comprimir distribución
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}"
          Compress-Archive `
            -Path "dist\Libre-IPTV" `
            -DestinationPath "Libre-IPTV-$ver-windows.zip"

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: Libre-IPTV-${{ github.ref_name }}-windows.zip

  build-macos:
    name: Construir release macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Instalar VLC (requerido por python-vlc)
        run: brew install --cask vlc

      - name: Instalar dependencias
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system "pyinstaller>=6.0"

      - name: Ejecutar suite de pruebas
        run: pytest --tb=short
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Construir .app
        run: pyinstaller iptv-player-mac.spec

      - name: Comprimir .app
        run: |
          ver="${{ github.ref_name }}"
          cd dist
          zip -r "../Libre-IPTV-${ver}-macos.zip" "Libre-IPTV.app"

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: Libre-IPTV-${{ github.ref_name }}-macos.zip

  build-linux:
    name: Construir release Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Instalar VLC y libs Qt (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y vlc libgl1 libegl1 libxcb-xinerama0 libxkbcommon-x11-0

      - name: Instalar dependencias
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system "pyinstaller>=6.0"

      - name: Ejecutar suite de pruebas
        run: pytest --tb=short
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Construir ejecutable
        run: pyinstaller iptv-player-linux.spec

      - name: Comprimir distribución
        run: |
          ver="${{ github.ref_name }}"
          cd dist
          tar czf "../Libre-IPTV-${ver}-linux.tar.gz" Libre-IPTV

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: Libre-IPTV-${{ github.ref_name }}-linux.tar.gz

  publish:
    name: Publicar release en GitHub
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "$VERSION" \
            --title "Libre IPTV $VERSION" \
            --generate-notes \
            --verify-tag \
            artifacts/windows-release/Libre-IPTV-${VERSION}-windows.zip#"Libre IPTV ${VERSION} — Windows" \
            artifacts/macos-release/Libre-IPTV-${VERSION}-macos.zip#"Libre IPTV ${VERSION} — macOS" \
            artifacts/linux-release/Libre-IPTV-${VERSION}-linux.tar.gz#"Libre IPTV ${VERSION} — Linux"
