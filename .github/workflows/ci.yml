name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, tipos y pruebas
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Instalar VLC (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install vlc --yes --no-progress

      - name: Instalar VLC (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask vlc

      - name: Instalar VLC y libs Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y vlc libgl1 libegl1 libxcb-xinerama0 libxkbcommon-x11-0

      - name: Instalar dependencias del proyecto
        run: uv pip install --system -e ".[dev]"

      - name: Ruff — linting
        run: ruff check src tests

      - name: Mypy — verificacion de tipos
        run: mypy src

      - name: Pytest — suite de pruebas
        run: pytest --tb=short
        env:
          QT_QPA_PLATFORM: offscreen
