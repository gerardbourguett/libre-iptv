name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, tipos y pruebas
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias del proyecto
        run: pip install -e ".[dev]"

      - name: Instalar VLC (requerido por python-vlc)
        shell: powershell
        run: choco install vlc --yes --no-progress

      - name: Ruff — linting
        run: ruff check src tests

      - name: Mypy — verificacion de tipos
        run: mypy src

      - name: Pytest — suite de pruebas
        run: pytest
        env:
          # Evita que Qt intente abrir una pantalla en el runner headless
          QT_QPA_PLATFORM: offscreen
